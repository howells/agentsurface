# .skill.yaml — Skill Distribution Manifest
# Format: Best practice for cross-platform skill distribution (April 2026)
# Not yet standardized, but future-proofs for emerging package managers.
#
# Status: This manifest is supplementary. The canonical entry point is
# skills/surface/SKILL.md (Claude Code) and AGENTS.md (Codex, generic agents).

name: surface
version: 2.0.0
license: MIT

description: |
  Make software legible to agents. One skill that routes to the right workflow:
  audit agent readiness, scaffold agent infrastructure, generate MCP servers,
  write context files, or fix specific gaps.

entry-point: ./skills/surface/SKILL.md

author:
  name: Daniel Howells

homepage: https://github.com/howells/agentsurface
repository:
  type: git
  url: https://github.com/howells/agentsurface.git

keywords:
  - agentic
  - mcp
  - api-design
  - cli-design
  - agent-dx
  - audit
  - transformation
  - scaffolding
  - llms-txt
  - agents-md
  - aeo
  - data-retrievability
  - vectors
  - rag
  - mastra
  - tools
  - workflows
  - ai-sdk
  - memory

compatibility:
  - claude-code >= 1.0.0
  - claude-agent-sdk >= 1.0.0
  - openai-codex >= 0.1.0
  - agents-md >= 1.0.0

dependencies: []

specialist-agents:
  - context-writer
  - discovery-writer
  - error-designer
  - api-optimizer
  - cli-enhancer
  - auth-upgrader
  - mcp-builder
  - test-writer
  - retrievability-engineer
  - agentic-patterns-writer

# Distribution URLs (for future registry lookup)
distribution:
  npm: "@anthropic/surface"  # Not yet on npm, planned
  github: "https://github.com/howells/agentsurface/releases"
  claude-code-plugin: "surface"
